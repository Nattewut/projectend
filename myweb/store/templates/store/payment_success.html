{% extends 'store/main.html' %}

{% block content %}
<h2>🎉 ชำระเงินสำเร็จแล้ว!</h2>
<p>ขอบคุณที่สั่งซื้อกับเรา</p>
<p>หมายเลขคำสั่งซื้อ: {{ order.id }}</p>
<p>สถานะการชำระเงิน: {{ order.payment_status }}</p>
<a href="/">กลับสู่หน้าร้าน</a>

<!-- เพิ่ม print เพื่อดูค่า return_uri ที่ใช้ในการ redirect -->
<p>กำลังไปที่: <strong>{{ return_uri }}</strong></p>

<script>
    // แสดงการ redirect ไปยัง URL ที่ต้องการ
    console.log("Redirecting to:", "{{ return_uri }}");
    window.location.href = "{{ return_uri }}"; 
</script>
{% endblock %}
